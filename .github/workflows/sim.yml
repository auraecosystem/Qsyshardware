name: sim
on:
  pull_request:
  push:
    branches:
      - main
      - test-pipeline
concurrency:
  group: sim-${{ github.ref }}
  cancel-in-progress: true
jobs:
  cocotb-ghdl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull dev image
        run: |
          docker pull ghcr.io/pedropcventura/riscv-dev_tools:dev
      - name: Run tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -u root \
            ghcr.io/pedropcventura/riscv-dev_tools:dev \
            make test
      - name: Upload waveforms
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waveforms
          path: "**/*.vcd"
          if-no-files-found: ignore
